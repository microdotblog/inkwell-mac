<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, sans-serif;
			margin: 0;
			margin-top: 40px;
			padding: 40px;
			color: #1d1d1f;
		}

		.content {
			max-width: 600px;
			margin-left: auto;
			margin-right: auto;
		}

		h1 {
			font-size: 30px;
			line-height: 1.2;
			margin: 0 0 12px;
		}

		article {
			font-size: 16px;
			line-height: 1.6;
		}

		p {
			font-size: 16px;
			line-height: 1.5;
			color: #1d1d1f;
		}

		img, video {
			max-width: 100%;
			height: auto;
		}

		pre {
			white-space: pre-wrap;
		}

		blockquote {
			border-left: 3px solid #d2d2d7;
			margin: 1em 0;
			padding-left: 1em;
			color: #4d4d4f;
		}
	</style>
</head>
<body>
	<div class="content">
		[TITLE]
		[CONTENT]
	</div>
</body>
</html>
